<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR University — Smart Campus Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Background elements -->
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>

    <!-- Main layout -->
    <div class="app-shell">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-mark">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <path d="M14 2L26 8V20L14 26L2 20V8L14 2Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
                        <path d="M14 8L20 11V17L14 20L8 17V11L14 8Z" fill="currentColor" opacity="0.3"/>
                        <circle cx="14" cy="14" r="2.5" fill="currentColor"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <span class="logo-name">SR University</span>
                    <span class="logo-sub">Campus Assistant</span>
                </div>
            </div>

            <nav class="quick-topics">
                <p class="nav-label">Quick Topics</p>
                <button class="topic-btn" data-query="What is the admission process?">
                    <span class="topic-icon">🎓</span>Admissions
                </button>
                <button class="topic-btn" data-query="What is the fee structure?">
                    <span class="topic-icon">💰</span>Fee Structure
                </button>
                <button class="topic-btn" data-query="What courses are offered?">
                    <span class="topic-icon">📚</span>Courses
                </button>
                <button class="topic-btn" data-query="Tell me about exam schedule">
                    <span class="topic-icon">📝</span>Exams
                </button>
                <button class="topic-btn" data-query="Placement details and packages">
                    <span class="topic-icon">💼</span>Placements
                </button>
                <button class="topic-btn" data-query="Hostel facilities and fees">
                    <span class="topic-icon">🏠</span>Hostel
                </button>
                <button class="topic-btn" data-query="Faculty information">
                    <span class="topic-icon">👨‍🏫</span>Faculty
                </button>
                <button class="topic-btn" data-query="Scholarship information">
                    <span class="topic-icon">🏆</span>Scholarships
                </button>
                <button class="topic-btn" data-query="College transport bus routes">
                    <span class="topic-icon">🚌</span>Transport
                </button>
                <button class="topic-btn" data-query="Contact details and location">
                    <span class="topic-icon">📞</span>Contact
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="language-toggle">
                    <button class="lang-btn active" id="lang-en" onclick="setLanguage('en')">EN</button>
                    <button class="lang-btn" id="lang-te" onclick="setLanguage('te')">తె</button>
                </div>
                <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
                <a href="/admin" class="admin-link" title="Admin Panel">⚙</a>
            </div>
        </aside>

        <!-- Chat area -->
        <main class="chat-main">
            <div class="chat-topbar">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <span></span><span></span><span></span>
                </button>
                <div class="bot-identity">
                    <div class="bot-avatar-sm">
                        <div class="pulse-ring"></div>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                            <path d="M18 6h2M20 6v2" stroke-width="2"/>
                        </svg>
                    </div>
                    <div>
                        <div class="bot-name-sm">EduBot</div>
                        <div class="bot-status"><span class="status-dot"></span>Online</div>
                    </div>
                </div>
                <button class="clear-btn" id="clearChat" title="Clear chat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.6"/>
                    </svg>
                </button>
            </div>

            <!-- Messages container -->
            <div class="messages-area" id="messagesArea">
                <!-- Welcome message -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-glyph">
                        <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
                            <path d="M28 4L52 16V40L28 52L4 40V16L28 4Z" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.3"/>
                            <path d="M28 12L44 20V36L28 44L12 36V20L28 12Z" fill="currentColor" opacity="0.15"/>
                            <circle cx="28" cy="28" r="7" fill="currentColor" opacity="0.6"/>
                            <circle cx="28" cy="28" r="3" fill="currentColor"/>
                        </svg>
                    </div>
                    <h1 class="welcome-title">Hello, I'm EduBot 👋</h1>
                    <p class="welcome-subtitle">Your intelligent assistant for SR University, Warangal. Ask me anything about admissions, courses, fees, placements and more.</p>
                    <div class="welcome-chips">
                        <button class="chip" data-query="How to apply for admission?">How to apply?</button>
                        <button class="chip" data-query="What is the fee structure?">Fee structure</button>
                        <button class="chip" data-query="Tell me about placements">Placements</button>
                        <button class="chip" data-query="What courses are offered?">Courses offered</button>
                    </div>
                </div>
            </div>

            <!-- Input area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <!-- Voice input button -->
                    <button class="voice-btn" id="voiceBtn" title="Voice input">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
                        </svg>
                    </button>
                    
                    <textarea
                        id="messageInput"
                        class="message-input"
                        placeholder="Ask about admissions, fees, courses, placements..."
                        rows="1"
                        maxlength="500"
                        autocomplete="off"
                    ></textarea>

                    <button class="send-btn" id="sendBtn" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line · <span id="charCount">0</span>/500</p>
            </div>
        </main>
    </div>

    <!-- Typing indicator template (hidden) -->
    <template id="typingTemplate">
        <div class="message bot-message typing-indicator" id="typingIndicator">
            <div class="message-avatar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                </svg>
            </div>
            <div class="message-bubble">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </template>

    <!-- Voice recording overlay -->
    <div class="voice-overlay" id="voiceOverlay" style="display:none">
        <div class="voice-modal">
            <div class="voice-wave">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
            <p>Listening...</p>
            <button onclick="stopVoiceRecording()">Stop</button>
        </div>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
