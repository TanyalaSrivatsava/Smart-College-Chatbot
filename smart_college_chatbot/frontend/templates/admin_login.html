<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — SR University Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0e0e1a;--bg2:#16162a;--accent:#5b4fcf;--gold:#d4a853;--text:#e8e4f0;--text2:#a0a0c8;--border:rgba(255,255,255,0.08); }
        * { box-sizing:border-box;margin:0;padding:0; }
        body { font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center; }
        .login-card { background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:400px;max-width:95%; }
        .logo { text-align:center;margin-bottom:28px; }
        .logo h1 { font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--gold); }
        .logo p { font-size:0.8rem;color:var(--text2);margin-top:4px; }
        .form-group { margin-bottom:16px; }
        label { display:block;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text2);margin-bottom:6px; }
        input { width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s; }
        input:focus { border-color:var(--accent); }
        .btn { width:100%;padding:13px;background:var(--accent);border:none;border-radius:10px;color:white;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;cursor:pointer;transition:background 0.2s;margin-top:8px; }
        .btn:hover { background:#6d62d4; }
        .error { background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;font-size:0.82rem;color:#fc8181;margin-bottom:16px; }
        .hint { text-align:center;font-size:0.75rem;color:var(--text2);margin-top:20px; }
        .hint strong { color:var(--text); }
        .back-link { display:block;text-align:center;margin-top:12px;color:var(--text2);text-decoration:none;font-size:0.82rem; }
        .back-link:hover { color:var(--text); }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">
        <h1>⚙ Admin Panel</h1>
        <p>SR University Chatbot Management</p>
    </div>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    
    <form id="loginForm">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn">Login to Dashboard</button>
    </form>
    
    <p class="hint">Default credentials: <strong>admin</strong> / <strong>admin123</strong></p>
    <a href="/" class="back-link">← Back to Chatbot</a>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.textContent = 'Logging in...'; btn.disabled = true;
    
    const response = await fetch('/admin/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        })
    });
    
    const data = await response.json();
    if (data.success) {
        window.location = data.redirect || '/admin/';
    } else {
        btn.textContent = 'Login to Dashboard'; btn.disabled = false;
        const existing = document.querySelector('.error');
        if (existing) existing.remove();
        const err = document.createElement('div');
        err.className = 'error'; err.textContent = data.error || 'Invalid credentials';
        document.getElementById('loginForm').before(err);
    }
});
</script>
</body>
</html>
